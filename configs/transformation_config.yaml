# Data Transformation Configuration for AI Medical Diagnosis Assistant
validated_images_dir: "data/raw/covid19-radiography-database/COVID-19_Radiography_Dataset"
validated_symptoms_csv: "data/processed/disease_symptom_cleaned.csv"
transformed_dir: "data/processed/transformed"
reports_dir: "docs/reports"

# Split parameters
train_split: 0.70
val_split: 0.15
test_split: 0.15
random_state: 42

# Image prep parameters
image_size: 224
imagenet_mean:
  - 0.485
  - 0.456
  - 0.406
imagenet_std:
  - 0.229
  - 0.224
  - 0.225

# Tabular parameters
disease_mapping_file: "data/processed/disease_mapping.json"

# PyTorch DataLoader parameters
batch_size: 32
shuffle_train: true
num_workers: 0  # 0 workers is standard and safest for multi-process data loading on Windows
pin_memory: true
persistent_workers: false
