# =============================================================
# docker-compose.yml — AI Medical Diagnosis Assistant
# =============================================================
# Runs both FastAPI and Streamlit together in a single image.
#
# Quick start:
#   docker compose up --build          # build & start
#   docker compose up -d               # detached mode
#   docker compose down                # stop & remove containers
#   docker compose logs -f             # stream logs
#
# Services:
#   api        → http://localhost:8000  (FastAPI + Swagger /docs)
#   streamlit  → http://localhost:8501  (Streamlit UI)
# =============================================================

version: "3.9"

# ─── Named volumes (runtime artefacts stay across restarts) ──
volumes:
  gradcam_output:
    driver: local
  app_logs:
    driver: local

# ─── Services ─────────────────────────────────────────────────
services:

  # ── FastAPI service ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime           # Use the lean runtime stage
    image: ai-medical-diagnosis-assistant:latest
    container_name: medical_ai_api
    command: >
      uvicorn src.api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 1
        --log-level info
        --no-access-log
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=
      - TOKENIZERS_PARALLELISM=false
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      - gradcam_output:/app/artifacts/gradcam
      - app_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    # Increase shared memory for PyTorch DataLoader workers
    shm_size: "256mb"

  # ── Streamlit frontend service ─────────────────────────────
  streamlit:
    image: ai-medical-diagnosis-assistant:latest
    container_name: medical_ai_streamlit
    command: >
      streamlit run src/frontend/app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
        --browser.gatherUsageStats false
        --server.fileWatcherType none
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=
      - TOKENIZERS_PARALLELISM=false
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_HEADLESS=true
      # Streamlit talks to FastAPI via Docker network
      - API_BASE_URL=http://api:8000
    volumes:
      - gradcam_output:/app/artifacts/gradcam
      - app_logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    shm_size: "256mb"
