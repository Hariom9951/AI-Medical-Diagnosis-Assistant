name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Sync and Push to Hugging Face Spaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Hugging Face Space Repository
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone the Hugging Face Space git repository using authentication secrets
          git clone "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/Hariom51/ai-medical-diagnosis-assistant" hf_space
          
          # Remove Git LFS tracking, cache and hook before sync
          cd hf_space
          git lfs uninstall || true
          rm -rf .git/lfs
          rm -f .git/hooks/pre-push

      - name: Sync Files to Hugging Face Space
        run: |
          # Use rsync to copy all files to the space, excluding model artifacts and LFS metadata
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='.pytest_cache/' \
            --exclude='.mypy_cache/' \
            --exclude='.coverage' \
            --exclude='.env' \
            --exclude='.gitattributes' \
            --exclude='artifacts/checkpoints/' \
            --exclude='artifacts/checkpoints_nlp/' \
            --exclude='*.pth' \
            --exclude='*.pt' \
            --exclude='*.pkl' \
            ./ hf_space/
            
          # Recreate checkpoint folders and write dummy/placeholder files so the Docker build succeeds
          mkdir -p hf_space/artifacts/checkpoints
          touch hf_space/artifacts/checkpoints/best_model.pth
          
          mkdir -p hf_space/artifacts/checkpoints_nlp
          touch hf_space/artifacts/checkpoints_nlp/config.json
          touch hf_space/artifacts/checkpoints_nlp/pytorch_model.bin
          touch hf_space/artifacts/checkpoints_nlp/tokenizer_config.json
          touch hf_space/artifacts/checkpoints_nlp/special_tokens_map.json
          touch hf_space/artifacts/checkpoints_nlp/vocab.txt


      - name: Commit and Push to Hugging Face Space
        run: |
          cd hf_space
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Neutralize Git LFS globally and locally for this step
          git config --global filter.lfs.clean "cat"
          git config --global filter.lfs.smudge "cat"
          git config --global filter.lfs.process "cat"
          git config --global filter.lfs.required "false"
          
          # Remove any potential recreated pre-push LFS hooks
          git lfs uninstall || true
          rm -rf .git/lfs
          rm -f .git/hooks/pre-push
          
          # Stage all synced files
          git add -A
          
          # Check for changes to prevent empty commits
          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping push."
          else
            git commit -m "Deploy to Hugging Face Spaces via GitHub Actions"
            git push --no-verify origin main
          fi
