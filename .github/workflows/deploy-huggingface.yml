name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Sync and Push to Hugging Face Spaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Hugging Face Space Repository
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone the Hugging Face Space git repository using authentication secrets
          git clone "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/Hariom51/ai-medical-diagnosis-assistant" hf_space

          # Remove Git LFS tracking, cache and hook before sync
          cd hf_space
          git lfs uninstall || true
          rm -rf .git/lfs
          rm -f .git/hooks/pre-push

      - name: Sync Files to Hugging Face Space
        run: |
          # Use rsync to copy all files to the space, excluding model artifacts,
          # LFS metadata, and large binary files.
          # Model checkpoints are NOT deployed here — they are fetched at runtime
          # via ModelDownloader from: Hariom9951/AI-Medical-Diagnosis-Models
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='.pytest_cache/' \
            --exclude='.mypy_cache/' \
            --exclude='.coverage' \
            --exclude='.env' \
            --exclude='.gitattributes' \
            --exclude='**/*.pth' \
            --exclude='**/*.pt' \
            --exclude='**/*.bin' \
            --exclude='**/*.pkl' \
            ./ hf_space/

          # Recreate empty artifact checkpoint directories so the
          # container's mkdir commands don't fail on first run.
          # These directories will be populated by ModelDownloader at startup.
          mkdir -p hf_space/artifacts/checkpoints
          mkdir -p hf_space/artifacts/checkpoints_nlp

          # Write .gitkeep placeholders so git tracks the empty dirs
          touch hf_space/artifacts/checkpoints/.gitkeep
          touch hf_space/artifacts/checkpoints_nlp/.gitkeep

      - name: Configure Hugging Face Space Secrets
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO_ID: "Hariom9951/AI-Medical-Diagnosis-Models"
        run: |
          # Write the Space .env file with the model repository configuration.
          # HF_TOKEN allows the Space to authenticate with the model repository.
          cat > hf_space/.env.space <<EOF
          # Auto-generated by GitHub Actions deploy workflow.
          # Model checkpoints are fetched at runtime from this repository:
          HF_MODEL_REPO_ID=${HF_MODEL_REPO_ID}
          EOF
          echo "Space .env.space written with HF_MODEL_REPO_ID=${HF_MODEL_REPO_ID}"

      - name: Commit and Push to Hugging Face Space
        run: |
          cd hf_space
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Neutralize Git LFS globally and locally for this step
          git config --global filter.lfs.clean "cat"
          git config --global filter.lfs.smudge "cat"
          git config --global filter.lfs.process "cat"
          git config --global filter.lfs.required "false"

          # Remove any potential recreated pre-push LFS hooks
          git lfs uninstall || true
          rm -rf .git/lfs
          rm -f .git/hooks/pre-push

          # Stage all synced files
          git add -A

          # Check for changes to prevent empty commits
          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping push."
          else
            git commit -m "Deploy to Hugging Face Spaces via GitHub Actions [models: Hariom9951/AI-Medical-Diagnosis-Models]"
            git push --no-verify origin main
          fi
